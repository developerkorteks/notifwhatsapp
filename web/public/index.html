<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JuraganXL WA Notif Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans p-6 min-h-screen">
    <div class="max-w-6xl mx-auto space-y-6">
        <!-- Header -->
        <header class="bg-white rounded-xl shadow p-6 flex justify-between items-center border border-gray-100">
            <div>
                <h1 class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-green-500 to-emerald-600">JuraganXL Notification Hub</h1>
                <p class="text-sm text-gray-500">Manage WhatsApp Stock & Custom Broadcasts</p>
            </div>
            <div id="statusBadge" class="px-4 py-2 rounded-full text-sm font-semibold flex items-center gap-2 bg-gray-100 text-gray-600">
                <span class="w-2 h-2 rounded-full bg-gray-400"></span> Disconnected
            </div>
        </header>

        <!-- Main Grid -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            
            <!-- Connection Panel -->
            <div class="bg-white rounded-xl shadow p-6 border border-gray-100 space-y-4">
                <h2 class="text-lg font-semibold border-b pb-2">Device Connection</h2>
                
                <div id="qrContainer" class="hidden flex flex-col items-center p-4 border-2 border-dashed rounded-lg bg-gray-50">
                    <p class="text-sm mb-2 text-gray-500">Scan QR in WhatsApp Settings > Linked Devices</p>
                    <div id="qrcode" class="bg-white p-2 rounded shadow-sm w-48 h-48 flex items-center justify-center">Loading QR...</div>
                </div>

                <div class="flex gap-2">
                    <button onclick="generateQR()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded w-full transition font-medium text-sm">Generate QR</button>
                    <button onclick="logout()" class="bg-red-50 text-red-600 border border-red-200 hover:bg-red-100 px-4 py-2 rounded w-full transition font-medium text-sm">Logout / Clean DB</button>
                </div>
            </div>

            <!-- Custom Broadcast Panel -->
            <div class="md:col-span-2 bg-white rounded-xl shadow p-6 border border-gray-100 space-y-4">
                <h2 class="text-lg font-semibold border-b pb-2">Send Custom Notification</h2>
                <textarea id="broadcastMsg" rows="5" class="w-full border rounded-lg p-3 text-sm focus:ring-2 focus:ring-green-500 focus:outline-none custom-scrollbar" placeholder="Type your multi-line message here...&#10;&#10;New lines and spaces will be preserved perfectly."></textarea>
                <button onclick="sendBroadcast()" class="bg-green-600 hover:bg-green-700 text-white px-6 py-2 rounded transition font-medium text-sm w-full md:w-auto">🚀 Send Custom Broadcast</button>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- Channels Panel -->
            <div class="bg-white rounded-xl shadow p-6 border border-gray-100 h-[30rem] flex flex-col">
                <div class="flex justify-between items-center border-b pb-2 mb-4">
                    <h2 class="text-lg font-semibold">Broadcaster Channel</h2>
                    <button onclick="syncChannels()" class="text-xs bg-gray-100 hover:bg-gray-200 px-3 py-1 rounded">Sync</button>
                </div>
                <input type="text" id="searchChannel" onkeyup="filterChannels()" placeholder="Search channels..." class="w-full border border-gray-200 rounded p-2 text-sm mb-3 focus:outline-none focus:ring-1 focus:ring-green-500">
                <div id="channelList" class="flex-1 overflow-y-auto space-y-2 custom-scrollbar pr-2">
                    <!-- Dynamic -->
                </div>
            </div>

            <!-- Groups Panel -->
            <div class="bg-white rounded-xl shadow p-6 border border-gray-100 h-[30rem] flex flex-col">
                <div class="flex justify-between items-center border-b pb-2 mb-4">
                    <h2 class="text-lg font-semibold">Target Groups</h2>
                    <button onclick="syncGroups()" class="text-xs bg-gray-100 hover:bg-gray-200 px-3 py-1 rounded">Sync</button>
                </div>
                <input type="text" id="searchGroup" onkeyup="filterGroups()" placeholder="Search groups..." class="w-full border border-gray-200 rounded p-2 text-sm mb-3 focus:outline-none focus:ring-1 focus:ring-green-500">
                <!-- Table headers -->
                <div class="grid grid-cols-12 gap-2 text-xs font-semibold text-gray-500 mb-2 px-2">
                    <div class="col-span-8">Group Name</div>
                    <div class="col-span-2 text-center">Auto-Stock</div>
                    <div class="col-span-2 text-center">Custom</div>
                </div>
                <div id="groupList" class="flex-1 overflow-y-auto space-y-2 custom-scrollbar pr-2">
                    <!-- Dynamic -->
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script>
        const API = 'http://localhost:8080/api';
        
        async function fetchStatus() {
            try {
                const res = await fetch(`${API}/wa/status`);
                const data = await res.json();
                const badge = document.getElementById('statusBadge');
                if (data.status === 'connected') {
                    badge.className = 'px-4 py-2 rounded-full text-sm font-semibold flex items-center gap-2 bg-green-50 text-green-700 border border-green-200';
                    badge.innerHTML = '<span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span> Connected';
                    document.getElementById('qrContainer').classList.add('hidden');
                } else {
                    badge.className = 'px-4 py-2 rounded-full text-sm font-semibold flex items-center gap-2 bg-gray-100 text-gray-600';
                    badge.innerHTML = '<span class="w-2 h-2 rounded-full bg-gray-400"></span> Disconnected';
                }
            } catch (e) {
                console.error('Status fail', e);
            }
        }

        async function generateQR() {
            document.getElementById('qrContainer').classList.remove('hidden');
            document.getElementById('qrcode').innerHTML = '<span class="text-xs text-gray-500">Generating...</span>';
            const res = await fetch(`${API}/wa/qr`);
            const data = await res.json();
            if (data.qr_code) {
                document.getElementById('qrcode').innerHTML = '';
                new QRCode(document.getElementById('qrcode'), {
                    text: data.qr_code, width: 160, height: 160
                });
            } else {
                document.getElementById('qrcode').innerHTML = `<span class="text-xs text-red-500">${data.error}</span>`;
            }
        }

        async function logout() {
            if(confirm("Logout and erase session database?")) {
                await fetch(`${API}/wa/logout`, { method: 'POST' });
                fetchStatus();
            }
        }

        async function syncChannels() {
            await fetch(`${API}/wa/channels/sync`, { method: 'POST' });
            loadChannels();
        }

        async function loadChannels() {
            const res = await fetch(`${API}/wa/channels`);
            const data = await res.json() || [];
            const list = document.getElementById('channelList');
            list.innerHTML = data.map(ch => `
                <div class="flex items-center justify-between p-3 bg-gray-50 rounded-lg hover:bg-gray-100 transition border ${ch.IsActive ? 'border-green-400 ring-1 ring-green-400' : 'border-gray-200'}">
                    <span class="text-sm truncate w-2/3">${ch.ChannelName}</span>
                    <button onclick="setActiveChannel('${ch.JID}')" class="text-xs px-3 py-1 rounded ${ch.IsActive ? 'bg-green-600 text-white' : 'bg-gray-200 text-gray-700 hover:bg-gray-300'}">${ch.IsActive ? 'Active' : 'Set Active'}</button>
                </div>
            `).join('');
        }

        async function setActiveChannel(jid) {
            await fetch(`${API}/wa/channels/active`, {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({jid})
            });
            loadChannels();
        }

        async function syncGroups() {
            await fetch(`${API}/wa/groups/sync`, { method: 'POST' });
            loadGroups();
        }

        async function loadGroups() {
            const res = await fetch(`${API}/wa/groups`);
            const data = await res.json() || [];
            const list = document.getElementById('groupList');
            list.innerHTML = data.map(g => `
                <div class="grid grid-cols-12 gap-2 items-center p-2 bg-gray-50 rounded-lg hover:bg-gray-100 transition border border-gray-200">
                    <span class="col-span-8 text-sm truncate" title="${g.GroupName}">${g.GroupName}</span>
                    <div class="col-span-2 text-center">
                        <input type="checkbox" onchange="updateGroup('${g.JID}', this.checked, ${g.IsCustomActive})" ${g.IsStockActive ? 'checked' : ''} class="w-4 h-4 text-green-600 rounded">
                    </div>
                    <div class="col-span-2 text-center">
                        <input type="checkbox" onchange="updateGroup('${g.JID}', ${g.IsStockActive}, this.checked)" ${g.IsCustomActive ? 'checked' : ''} class="w-4 h-4 text-green-600 rounded">
                    </div>
                </div>
            `).join('');
        }

        async function updateGroup(jid, stock, custom) {
            await fetch(`${API}/wa/groups/settings`, {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({jid, is_stock_active: stock, is_custom_active: custom})
            });
        }

        async function sendBroadcast() {
            const btn = document.querySelector('button[onclick="sendBroadcast()"]');
            const msg = document.getElementById('broadcastMsg').value;
            
            if(!msg) return alert("Message is empty");
            if(!confirm("Send broadcast to ALL configured custom groups?")) return;

            btn.innerText = "Sending..."; btn.disabled = true;
            try {
                const res = await fetch(`${API}/broadcast/custom`, {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({message: msg})
                });
                const data = await res.json();
                if(!res.ok) throw new Error(data.error);
                alert("Broadcast Success!");
                document.getElementById('broadcastMsg').value = '';
            } catch (e) {
                alert("Failed: " + e.message);
            }
            btn.innerText = "🚀 Send Custom Broadcast"; btn.disabled = false;
        }

        function filterChannels() {
            const input = document.getElementById('searchChannel').value.toLowerCase();
            const items = document.querySelectorAll('#channelList > div');
            items.forEach(item => {
                const text = item.querySelector('span').innerText.toLowerCase();
                item.style.display = text.includes(input) ? '' : 'none';
            });
        }

        function filterGroups() {
            const input = document.getElementById('searchGroup').value.toLowerCase();
            const items = document.querySelectorAll('#groupList > div');
            items.forEach(item => {
                const text = item.querySelector('span').innerText.toLowerCase();
                item.style.display = text.includes(input) ? '' : 'none';
            });
        }

        // Init
        fetchStatus();
        loadChannels();
        loadGroups();
        setInterval(fetchStatus, 3000); // refresh status
    </script>
</body>
</html>
