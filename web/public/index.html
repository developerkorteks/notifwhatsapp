<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JuraganXL WA Notif Dashboard</title>
    <script src="https://cdn.tailwindcss.com" data-cfasync="false"></script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans p-6 min-h-screen">
    <div class="max-w-6xl mx-auto space-y-6">
        <!-- Header -->
        <header class="bg-white rounded-xl shadow p-6 flex flex-col md:flex-row justify-between items-center border border-gray-100 gap-4">
            <div>
                <h1 class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-green-500 to-emerald-600">JuraganXL Notification Hub</h1>
                <p class="text-sm text-gray-500">Manage WhatsApp Stock & Custom Broadcasts</p>
            </div>
            <div class="flex items-center gap-4 flex-wrap justify-end">
                <div class="flex items-center gap-2 bg-gray-50 p-2 rounded-lg border border-gray-200">
                    <label class="text-sm font-medium text-gray-600">Account:</label>
                    <select id="accountSelector" onchange="switchAccount()" class="border border-gray-300 rounded p-1.5 text-sm focus:ring-green-500 focus:outline-none min-w-[150px] bg-white">
                        <option value="">Loading...</option>
                    </select>
                    <button onclick="createNewAccount()" class="text-xs bg-green-100 text-green-700 px-3 py-1.5 rounded hover:bg-green-200 font-bold" title="Add New Account">+ Add</button>
                    <button onclick="deleteCurrentAccount()" class="text-xs bg-red-100 text-red-700 px-3 py-1.5 rounded hover:bg-red-200 font-bold" title="Delete Selected Account">Delete</button>
                </div>
                <div id="statusBadge" class="px-4 py-2 rounded-full text-sm font-semibold flex items-center gap-2 bg-gray-100 text-gray-600 min-w-[130px] justify-center">
                    <span class="w-2 h-2 rounded-full bg-gray-400"></span> Disconnected
                </div>
            </div>
        </header>

        <!-- Main Grid -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            
            <!-- Connection Panel -->
            <div class="bg-white rounded-xl shadow p-6 border border-gray-100 space-y-4">
                <h2 class="text-lg font-semibold border-b pb-2">Device Connection</h2>
                
                <div id="qrContainer" class="hidden flex flex-col items-center p-4 border-2 border-dashed rounded-lg bg-gray-50">
                    <p class="text-sm mb-2 text-gray-500">Scan QR in WhatsApp Settings > Linked Devices</p>
                    <div id="qrcode" class="bg-white p-2 rounded shadow-sm w-48 h-48 flex items-center justify-center">Loading QR...</div>
                </div>

                <div class="flex gap-2">
                    <button onclick="generateQR()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded w-full transition font-medium text-sm">Generate QR</button>
                    <button onclick="logout()" class="bg-red-50 text-red-600 border border-red-200 hover:bg-red-100 px-4 py-2 rounded w-full transition font-medium text-sm">Logout App</button>
                </div>
            </div>

            <!-- Custom Broadcast Panel -->
            <div class="md:col-span-2 bg-white rounded-xl shadow p-6 border border-gray-100 space-y-4">
                <h2 class="text-lg font-semibold border-b pb-2">Send Custom Notification</h2>

                <div class="flex flex-wrap gap-4 mb-2">
                    <label class="flex items-center gap-2 text-sm cursor-pointer">
                        <input type="radio" name="msgType" value="standard" checked onclick="togglePollOpts()" class="text-green-600 focus:ring-green-500"> Standard Text
                    </label>
                    <label class="flex items-center gap-2 text-sm cursor-pointer" title="Auto-converts Text to Image if no file is uploaded.">
                        <input type="radio" name="msgType" value="view_once" onclick="togglePollOpts()" class="text-green-600 focus:ring-green-500"> View Once (Secret Media)
                    </label>
                    <label class="flex items-center gap-2 text-sm cursor-pointer" title="Sends a Status/Story directly inside a target Custom Group.">
                        <input type="radio" name="msgType" value="swgc" onclick="togglePollOpts()" class="text-green-600 focus:ring-green-500"> Status Ke Group (SWGC)
                    </label>
                    <label class="flex items-center gap-2 text-sm cursor-pointer">
                        <input type="radio" name="msgType" value="poll" onclick="togglePollOpts()" class="text-green-600 focus:ring-green-500"> Interactive Poll
                    </label>
                </div>
                
                <div id="mediaContainer" class="hidden mb-2">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Upload Media (Standard / View Once / SWGC)</label>
                    <input type="file" id="mediaUpload" accept="image/*,video/*,audio/*" class="w-full text-sm border p-2 rounded focus:ring-green-500">
                </div>

                <textarea id="broadcastMsg" rows="5" class="w-full border rounded-lg p-3 text-sm focus:ring-2 focus:ring-green-500 focus:outline-none custom-scrollbar" placeholder="Type your multi-line message here... (If Poll, this is the Question)"></textarea>
                
                <div id="pollOptionsContainer" class="hidden space-y-2 mt-2">
                    <h3 class="text-sm font-semibold text-gray-700">Poll Options</h3>
                    <div id="pollInputs" class="space-y-2">
                        <input type="text" class="poll-opt w-full border rounded p-2 text-sm focus:ring-2 focus:ring-green-500" placeholder="Option 1">
                        <input type="text" class="poll-opt w-full border rounded p-2 text-sm focus:ring-2 focus:ring-green-500" placeholder="Option 2">
                    </div>
                    <button onclick="addPollOption()" class="text-sm text-blue-600 hover:text-blue-800 font-medium">+ Add Option</button>
                </div>

                <button onclick="sendBroadcast()" class="bg-green-600 hover:bg-green-700 text-white px-6 py-2 rounded transition font-medium text-sm w-full md:w-auto mt-4">🚀 Send Custom Broadcast</button>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- Channels Panel -->
            <div class="bg-white rounded-xl shadow p-6 border border-gray-100 h-[30rem] flex flex-col">
                <div class="flex justify-between items-center border-b pb-2 mb-4">
                    <h2 class="text-lg font-semibold">Broadcaster Channel</h2>
                    <button onclick="syncChannels()" class="text-xs bg-gray-100 hover:bg-gray-200 px-3 py-1 rounded">Sync</button>
                </div>
                <input type="text" id="searchChannel" onkeyup="filterChannels()" placeholder="Search channels..." class="w-full border border-gray-200 rounded p-2 text-sm mb-3 focus:outline-none focus:ring-1 focus:ring-green-500">
                <div id="channelList" class="flex-1 overflow-y-auto space-y-2 custom-scrollbar pr-2">
                    <!-- Dynamic -->
                </div>
            </div>

            <!-- Groups Panel -->
            <div class="bg-white rounded-xl shadow p-6 border border-gray-100 h-[30rem] flex flex-col">
                <div class="flex justify-between items-center border-b pb-2 mb-4">
                    <h2 class="text-lg font-semibold">Target Groups</h2>
                    <button onclick="syncGroups()" class="text-xs bg-gray-100 hover:bg-gray-200 px-3 py-1 rounded">Sync</button>
                </div>
                <input type="text" id="searchGroup" onkeyup="filterGroups()" placeholder="Search groups..." class="w-full border border-gray-200 rounded p-2 text-sm mb-3 focus:outline-none focus:ring-1 focus:ring-green-500">
                <!-- Table headers -->
                <div class="grid grid-cols-12 gap-2 text-xs font-semibold text-gray-500 mb-2 px-2">
                    <div class="col-span-6">Group Name</div>
                    <div class="col-span-2 text-center">Auto-Stock</div>
                    <div class="col-span-2 text-center">Custom</div>
                    <div class="col-span-2 text-center text-red-500" title="Delete WhatsApp group/wa.me links sent by users">Anti-SWGC</div>
                </div>
                <div id="groupList" class="flex-1 overflow-y-auto space-y-2 custom-scrollbar pr-2">
                    <!-- Dynamic -->
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script>
        const API = window.location.origin + '/api';
        let currentAccountID = null;
        
        async function loadAccounts() {
            try {
                const res = await fetch(`${API}/accounts`);
                const data = await res.json() || [];
                const select = document.getElementById('accountSelector');
                select.innerHTML = '';
                
                if (data.length === 0) {
                    select.innerHTML = '<option value="">No Accounts Found</option>';
                    currentAccountID = null;
                } else {
                    data.forEach(acc => {
                        select.innerHTML += `<option value="${acc.ID}">${acc.SessionName}</option>`;
                    });
                    
                    // Maintain selection if exists, else first
                    if (!currentAccountID || !data.find(a => a.ID == currentAccountID)) {
                        currentAccountID = data[0].ID;
                    }
                    select.value = currentAccountID;
                }
                switchAccount(); // Trigger UI refresh for selected account
            } catch (e) {
                console.error("Failed to load accounts:", e);
            }
        }

        function switchAccount() {
            const val = document.getElementById('accountSelector').value;
            if (val) {
                currentAccountID = val;
                fetchStatus();
                loadChannels();
                loadGroups();
            } else {
                currentAccountID = null;
                document.getElementById('channelList').innerHTML = '';
                document.getElementById('groupList').innerHTML = '';
                const badge = document.getElementById('statusBadge');
                badge.className = 'px-4 py-2 rounded-full text-sm font-semibold flex items-center gap-2 bg-gray-100 text-gray-600 min-w-[130px] justify-center';
                badge.innerHTML = '<span class="w-2 h-2 rounded-full bg-gray-400"></span> Disconnected';
                document.getElementById('qrContainer').classList.add('hidden');
            }
        }

        async function createNewAccount() {
            const name = prompt("Enter a name for the new WhatsApp Account (e.g., 'Bot Support', 'Main'):");
            if (!name || name.trim() === "") return;
            try {
                await fetch(`${API}/accounts`, {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({session_name: name.trim()})
                });
                loadAccounts();
            } catch (e) {
                alert("Failed to create account. Name must be unique.");
            }
        }

        async function deleteCurrentAccount() {
            if (!currentAccountID) return alert("No active account to delete.");
            if (confirm("Are you sure you want to permanently delete this account and all its active groups/channels?")) {
                await fetch(`${API}/accounts/${currentAccountID}`, { method: 'DELETE' });
                loadAccounts();
            }
        }

        async function fetchStatus() {
            if (!currentAccountID) return;
            try {
                const res = await fetch(`${API}/wa/status?account_id=${currentAccountID}`);
                const data = await res.json();
                const badge = document.getElementById('statusBadge');
                if (data.status === 'connected') {
                    badge.className = 'px-4 py-2 rounded-full text-sm font-semibold flex items-center gap-2 bg-green-50 text-green-700 border border-green-200 min-w-[130px] justify-center';
                    badge.innerHTML = '<span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span> Connected';
                    document.getElementById('qrContainer').classList.add('hidden');
                } else {
                    badge.className = 'px-4 py-2 rounded-full text-sm font-semibold flex items-center gap-2 bg-gray-100 text-gray-600 min-w-[130px] justify-center';
                    badge.innerHTML = '<span class="w-2 h-2 rounded-full bg-gray-400"></span> Disconnected';
                }
            } catch (e) {
                console.error('Status fail', e);
            }
        }

        async function generateQR() {
            if (!currentAccountID) return alert("Select or add an account first!");
            document.getElementById('qrContainer').classList.remove('hidden');
            document.getElementById('qrcode').innerHTML = '<span class="text-xs text-gray-500">Generating...</span>';
            const res = await fetch(`${API}/wa/qr?account_id=${currentAccountID}`);
            const data = await res.json();
            if (data.qr_code) {
                document.getElementById('qrcode').innerHTML = '';
                new QRCode(document.getElementById('qrcode'), {
                    text: data.qr_code, width: 160, height: 160
                });
            } else {
                document.getElementById('qrcode').innerHTML = `<span class="text-xs text-red-500">${data.error}</span>`;
            }
        }

        async function logout() {
            if (!currentAccountID) return;
            if(confirm("Logout and erase session database for this account?")) {
                await fetch(`${API}/wa/logout?account_id=${currentAccountID}`, { method: 'POST' });
                fetchStatus();
            }
        }

        async function syncChannels() {
            if (!currentAccountID) return alert("Select an account first");
            await fetch(`${API}/wa/channels/sync?account_id=${currentAccountID}`, { method: 'POST' });
            loadChannels();
        }

        async function loadChannels() {
            if (!currentAccountID) return;
            const res = await fetch(`${API}/wa/channels?account_id=${currentAccountID}`);
            const data = await res.json() || [];
            const list = document.getElementById('channelList');
            list.innerHTML = data.map(ch => `
                <div class="flex items-center justify-between p-3 bg-gray-50 rounded-lg hover:bg-gray-100 transition border ${ch.IsActive ? 'border-green-400 ring-1 ring-green-400' : 'border-gray-200'}">
                    <span class="text-sm truncate w-2/3">${ch.ChannelName}</span>
                    <button onclick="setActiveChannel('${ch.JID}')" class="text-xs px-3 py-1 rounded ${ch.IsActive ? 'bg-green-600 text-white' : 'bg-gray-200 text-gray-700 hover:bg-gray-300'}">${ch.IsActive ? 'Active' : 'Set Active'}</button>
                </div>
            `).join('');
        }

        async function setActiveChannel(jid) {
            if (!currentAccountID) return;
            await fetch(`${API}/wa/channels/active`, {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({account_id: parseInt(currentAccountID), jid})
            });
            loadChannels();
        }

        async function syncGroups() {
            if (!currentAccountID) return alert("Select an account first");
            await fetch(`${API}/wa/groups/sync?account_id=${currentAccountID}`, { method: 'POST' });
            loadGroups();
        }

        async function loadGroups() {
            if (!currentAccountID) return;
            const res = await fetch(`${API}/wa/groups?account_id=${currentAccountID}`);
            const data = await res.json() || [];
            const list = document.getElementById('groupList');
            list.innerHTML = data.map(g => `
                <div class="grid grid-cols-12 gap-2 items-center p-2 bg-gray-50 rounded-lg hover:bg-gray-100 transition border border-gray-200">
                    <span class="col-span-6 text-sm truncate" title="${g.GroupName}">${g.GroupName}</span>
                    <div class="col-span-2 text-center">
                        <input type="checkbox" id="stock_${g.JID}" onchange="updateGroupState('${g.JID}')" ${g.IsStockActive ? 'checked' : ''} class="w-4 h-4 text-green-600 rounded">
                    </div>
                    <div class="col-span-2 text-center">
                        <input type="checkbox" id="custom_${g.JID}" onchange="updateGroupState('${g.JID}')" ${g.IsCustomActive ? 'checked' : ''} class="w-4 h-4 text-green-600 rounded">
                    </div>
                    <div class="col-span-2 text-center">
                        <input type="checkbox" id="antiswgc_${g.JID}" onchange="updateGroupState('${g.JID}')" ${g.IsAntiSwgcActive ? 'checked' : ''} class="w-4 h-4 text-red-600 rounded">
                    </div>
                </div>
            `).join('');
        }

        async function updateGroupState(jid) {
            if (!currentAccountID) return;
            const stockChecked = document.getElementById(`stock_${jid}`).checked;
            const customChecked = document.getElementById(`custom_${jid}`).checked;
            const antiSwgcChecked = document.getElementById(`antiswgc_${jid}`).checked;
            await fetch(`${API}/wa/groups/settings`, {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    account_id: parseInt(currentAccountID),
					jid, 
					is_stock_active: stockChecked, 
					is_custom_active: customChecked,
					is_anti_swgc_active: antiSwgcChecked
				})
            });
        }

        async function sendBroadcast() {
            if (!currentAccountID) return alert("Please select a WhatsApp account first");
            
            const btn = document.querySelector('button[onclick="sendBroadcast()"]');
            const msg = document.getElementById('broadcastMsg').value;
            const type = document.querySelector('input[name="msgType"]:checked').value;
            const fileInput = document.getElementById('mediaUpload');
            
            let options = [];
            if (type === 'poll') {
                const optInputs = document.querySelectorAll('.poll-opt');
                optInputs.forEach(i => {
                    if (i.value.trim() !== "") options.push(i.value.trim());
                });
                if (options.length < 2) return alert("Poll must have at least 2 valid options.");
            }

            if(!msg && (!fileInput.files || fileInput.files.length === 0)) return alert("Message or Media cannot be entirely empty");
            if(!confirm(`Send ${type} broadcast from this account to ALL its configured custom groups?`)) return;

            btn.innerText = "Sending..."; btn.disabled = true;

            const formData = new FormData();
            formData.append('account_id', currentAccountID);
            formData.append('message', msg);
            formData.append('msg_type', type);
            if (type === 'poll') {
                formData.append('poll_options', options.join("||"));
            }
            if (fileInput.files && fileInput.files.length > 0) {
                formData.append('media', fileInput.files[0]);
            }

            try {
                const res = await fetch(`${API}/broadcast/custom`, {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();
                if(!res.ok) throw new Error(data.error);
                alert("Broadcast Success!");
                document.getElementById('broadcastMsg').value = '';
                fileInput.value = '';
            } catch (e) {
                alert("Failed: " + e.message);
            }
            btn.innerText = "🚀 Send Custom Broadcast"; btn.disabled = false;
        }

        function togglePollOpts() {
            const type = document.querySelector('input[name="msgType"]:checked').value;
            const pollContainer = document.getElementById('pollOptionsContainer');
            const mediaContainer = document.getElementById('mediaContainer');
            
            pollContainer.style.display = type === 'poll' ? 'block' : 'none';
            mediaContainer.style.display = type === 'poll' ? 'none' : 'block';
        }
        
        // Execute initially to set state
        togglePollOpts();

        function addPollOption() {
            const div = document.createElement('div');
            div.innerHTML = `<input type="text" class="poll-opt w-full border rounded p-2 text-sm focus:ring-2 focus:ring-green-500 mt-2" placeholder="Another Option">`;
            document.getElementById('pollInputs').appendChild(div);
        }

        function filterChannels() {
            const input = document.getElementById('searchChannel').value.toLowerCase();
            const items = document.querySelectorAll('#channelList > div');
            items.forEach(item => {
                const text = item.querySelector('span').innerText.toLowerCase();
                item.style.display = text.includes(input) ? '' : 'none';
            });
        }

        function filterGroups() {
            const input = document.getElementById('searchGroup').value.toLowerCase();
            const items = document.querySelectorAll('#groupList > div');
            items.forEach(item => {
                const text = item.querySelector('span').innerText.toLowerCase();
                item.style.display = text.includes(input) ? '' : 'none';
            });
        }

        // Init
        loadAccounts(); // will automatically trigger the others
        setInterval(fetchStatus, 3000); // refresh status
    </script>
</body>
</html>
